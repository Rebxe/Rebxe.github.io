<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受保护的内容</title>
    
    <!-- CryptoJS 库 -->
    <script src="https://cdn.jsdmirror.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        /* 样式不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, 
                     Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            color: #1a2a6c;
            margin-bottom: 24px;
            font-weight: 700;
            font-size: 28px;
        }
        
        .password-container {
            position: relative;
            margin-bottom: 28px;
        }
        
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.5);
        }
        
        button {
            background: linear-gradient(90deg, #1a2a6c, #4a90e2);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:active {
            transform: translateY(-1px);
        }
        
        .error {
            color: #e74c3c;
            margin-top: 16px;
            font-size: 16px;
            min-height: 24px;
        }
        
        .hint {
            color: #666;
            margin-top: 16px;
            font-size: 14px;
        }
        
        .content-area {
            display: none;
            margin-top: 30px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div id="root_div" class="container" style="display:none">
        <h1>🔒 受保护的内容</h1>
        <div class="password-container">

        </div>
        <button onclick="decryptContent()">访问内容</button>
        <div class="error" id="errorMessage"></div>
        <p class="hint">首次访问后密钥将保存在您的浏览器中</p>
        <div class="content-area" id="contentArea"></div>
    </div>

        const verificationString = "DECRYPT_OK_VERIFY_STRING_1234";
        const maxRetry = 3;
        let retryCount = 0;
        
        function getSavedPassword() {
            // 更可靠的cookie解析
            const value = `; ${document.cookie}`;
            const parts = value.split(`; password=`);
            if (parts.length === 2) {
                return parts.pop().split(';').shift();
            }
            return null;
        }
        
        function savePassword(password) {
            const expires = new Date();
            expires.setFullYear(expires.getFullYear() + 1);
            document.cookie = `password=${encodeURIComponent(password)}; expires=${expires.toUTCString()}; path=/; samesite=lax`;
        }
        
        // 修复后的解密函数 - 与JavaScript实现完全兼容
        function decryptAES(encrypted, secretKey) {
            try {
                // 确保输入正确分割
                const [ivHex, ciphertext] = encrypted.split(':');
                if (!ivHex || !ciphertext) {
                    throw new Error("无效的加密格式");
                }
                
                // 使用正确的MD5生成密钥 - CryptoJS API使用
                const key = CryptoJS.MD5(secretKey);
                const iv = CryptoJS.enc.Hex.parse(ivHex);
                
                // 使用CryptoJS解密API
                const decrypted = CryptoJS.AES.decrypt(
                    ciphertext,
                    key,
                    {
                        iv: iv,
                        mode: CryptoJS.mode.CBC,
                        padding: CryptoJS.pad.Pkcs7
                    }
                );
                
                // 转换为UTF-8字符串
                return decrypted.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                console.error('解密错误:', e);
                showError("解密失败，请检查密钥。");
                return null;
            }
        }
        
        // 解密主函数
        function decryptContent() {
            const passwordInput = document.getElementById('password').value.trim();
            const password = passwordInput || getSavedPassword();
            
            if (!password) {
                showError("请输入访问密钥");
                return;
            }
            
            retryCount++;
            
            const decryptedText = decryptAES(encryptedContent, password);
            
            if (decryptedText && decryptedText.includes(verificationString)) {
                savePassword(password);
                
                const actualContent = decryptedText.replace(verificationString, '');
                document.open();
                document.write(actualContent);
                document.close();
                
            } else {
                showError(retryCount >= maxRetry ? 
                    "尝试次数过多" : 
                    "密钥错误，请重试");
                
                if (retryCount >= maxRetry) {
                    document.getElementById('password').disabled = true;
                }
            }
        }
        
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.innerText = message;
            errorElement.style.color = '#e74c3c';
            
            // 错误动画
            errorElement.style.transition = 'none';
            errorElement.style.transform = 'translateX(5px)';
            setTimeout(() => {
                errorElement.style.transition = 'transform 0.3s';
                errorElement.style.transform = 'translateX(0)';
            }, 10);
            
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
        
        // 页面加载时检查保存的密码
        window.onload = function() {
            const savedPassword = getSavedPassword();
            if (savedPassword) {
                const decryptedText = decryptAES(encryptedContent, savedPassword);
                if (decryptedText && decryptedText.includes(verificationString)) {
                    const actualContent = decryptedText.replace(verificationString, '');
                    document.open();
                    document.write(actualContent);
                    document.close();
                    return;
                }
            }
            document.getElementById('root_div').style.display = 'block';
        };
    </script>
